[project]
name = "corpus-studio-engine"
# Versioned together with the desktop app (apps/desktop/Directory.Build.props).
version = "1.2.15"
description = "Dataset engine for Corpus Studio"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "MalloyTheDev" }]
dependencies = [
    "pydantic>=2.0",
    "typer>=0.12",
    "orjson>=3.10"
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.5"
]

[project.scripts]
corpus-studio = "corpus_studio.cli:app"

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: opt-in tests that require a running local backend (e.g. Ollama). Enable with CORPUS_STUDIO_OLLAMA_INTEGRATION=1.",
]
