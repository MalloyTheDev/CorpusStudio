name: Engine Tests

on:
  push:
  pull_request:

jobs:
  python-engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install engine
        run: |
          cd engine
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd engine
          pytest
