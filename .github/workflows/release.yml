name: Release

# Automates the release checklist's build/package step (docs/RELEASE_CHECKLIST.md): run the engine
# + desktop gates, publish the self-contained single-file Windows build, and attach it to a GitHub
# Release. Runs on a pushed `v*` tag (the release is published then). `workflow_dispatch` does a
# DRY-RUN build on any ref — it publishes nothing, only uploads the zip as a workflow artifact so the
# packaging can be validated without cutting a release.
#
# The WPF product head is Windows-only, so macOS/Linux distributables track the cross-platform
# Avalonia head (issue #188 / AVALONIA_MIGRATION_PLAN.md Phase 4): the `avalonia-dist` job below
# publishes self-contained builds for linux-x64 + osx-arm64/x64 on native runners, uploads them as
# artifacts (so a workflow_dispatch dry-run validates packaging), and — on a tag — attaches them to
# the same GitHub Release as the Windows build.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write # create the release + upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Engine gate (dependency-light): the same ruff + mypy + pytest that gate every PR.
      - name: Engine gate
        run: |
          cd engine
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check .
          mypy corpus_studio
          pytest -q

      # Desktop gate: build + full test suite in Release.
      - name: Desktop tests (Release)
        run: dotnet test apps/desktop/CorpusStudio.Desktop.Tests/CorpusStudio.Desktop.Tests.csproj -c Release

      # Self-contained single-file Windows build (needs no installed .NET runtime; the Python engine
      # remains a runtime prerequisite). Profile: apps/.../PublishProfiles/win-x64.pubxml.
      - name: Publish Windows single-file
        run: dotnet publish apps/desktop/CorpusStudio.Desktop/CorpusStudio.Desktop.csproj -c Release -p:PublishProfile=win-x64

      - name: Package
        shell: pwsh
        env:
          REF: ${{ github.ref_name }}
        run: |
          # Sanitize the ref for a filename: a workflow_dispatch dry-run can run on a branch whose
          # name has a '/' (e.g. feat/x), which would otherwise make Compress-Archive target a missing
          # subdirectory. Tags (v1.2.3) are unaffected. Read the ref from env (never spliced into the
          # script text) so a crafted branch name can't inject commands.
          $version = "$env:REF".Replace('/', '-')
          $zip = "CorpusStudio-$version-win-x64.zip"
          Compress-Archive -Path apps/desktop/CorpusStudio.Desktop/bin/publish/win-x64/* -DestinationPath $zip
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Always available for inspection (this is what makes a workflow_dispatch dry-run verifiable).
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: corpus-studio-win-x64
          path: ${{ env.ASSET }}

      # Only when a tag was pushed: publish the GitHub Release with the zip attached. Uses the built-in
      # gh CLI + GITHUB_TOKEN — no third-party action.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref_name }}
        run: gh release create "$env:REF" "${{ env.ASSET }}" --title "$env:REF" --generate-notes

  # macOS/Linux distributables (Avalonia head). Built on NATIVE runners so the executable + native
  # libs (Skia/HarfBuzz) are correct and carry the exec bit. `needs: release` so these only run once
  # the shared engine+desktop gates pass, and so the Release the Windows job created already exists
  # when a tag attaches these assets to it.
  avalonia-dist:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-latest
            rid: osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      # Self-contained (needs no installed .NET runtime). A folder publish + tar.gz — more robust for
      # Avalonia's native libraries than a single-file bundle. The Python engine remains a runtime
      # prerequisite, same as the Windows build.
      - name: Publish Avalonia head (${{ matrix.rid }})
        run: >
          dotnet publish apps/desktop/CorpusStudio.Avalonia/CorpusStudio.Avalonia.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -o dist/${{ matrix.rid }}

      - name: Package (tar.gz)
        env:
          REF: ${{ github.ref_name }}
        run: |
          # Sanitize the ref for a filename (a dry-run branch like feat/x has a '/'); tags are unaffected.
          # Read the ref from env (never spliced into the script) so a crafted branch name can't inject.
          ref="$REF"
          asset="CorpusStudio-${ref//\//-}-${{ matrix.rid }}.tar.gz"
          tar -czf "$asset" -C "dist/${{ matrix.rid }}" .
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: corpus-studio-${{ matrix.rid }}
          path: ${{ env.ASSET }}

      # Only on a tag: attach to the Release the Windows job already created.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref_name }}
        run: gh release upload "$REF" "${{ env.ASSET }}" --clobber
