name: Loop Controller

# Re-review #13: the autonomous-loop controller lives at the repo ROOT (scripts/loop/**, scripts/loop_adapters/**,
# scripts/cs_loop.py) - OUTSIDE engine/, so the engine job's `ruff check .` / `mypy` / coverage never touch it.
# This dedicated job lints, type-checks, byte-compiles, and coverage-measures the loop tree directly, and (via
# the loop test-suite) asserts the controller imports only the standard library. Mark it a REQUIRED check in
# branch protection so a loop regression cannot merge.

on:
  push:
  pull_request:

# Least privilege: read the code only.
permissions:
  contents: read

jobs:
  loop-controller:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pinned tooling
        # The loop is stdlib-only, so it needs no engine install - just the linters + pytest. `-c
        # engine/constraints.txt` pins ruff to the SAME version the engine job uses (see #673), so the two
        # jobs never disagree on lint rules.
        run: |
          python -m pip install --upgrade pip
          pip install -c engine/constraints.txt ruff mypy pytest pytest-cov

      - name: Lint (ruff, engine config)
        run: |
          ruff check --config engine/pyproject.toml \
            scripts/loop scripts/loop_adapters scripts/cs_loop.py \
            engine/tests/test_loop_*.py engine/tests/test_cs_loop.py

      - name: Type check (mypy, engine config)
        run: mypy --config-file engine/pyproject.toml scripts/loop scripts/loop_adapters scripts/cs_loop.py

      - name: Byte-compile
        run: python -m compileall scripts/loop scripts/loop_adapters scripts/cs_loop.py

      - name: Tests + coverage (loop tree)
        # The loop tests add scripts/ to sys.path and import loop.* / loop_adapters.* only - no engine
        # install required. test_loop_stdlib_only enforces the stdlib-only import boundary. The floor sits
        # below the current ~95% to catch a real drop without flapping on a line or two.
        run: |
          pytest engine/tests/test_loop_*.py engine/tests/test_cs_loop.py \
            --cov=scripts/loop --cov=scripts/loop_adapters --cov-report=term-missing --cov-fail-under=90
