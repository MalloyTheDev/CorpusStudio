name: Desktop Tests

on:
  push:
  pull_request:

# Least privilege: building + testing only needs to read the repository.
permissions:
  contents: read

jobs:
  desktop-tests:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore apps/desktop/CorpusStudio.Desktop.Tests/CorpusStudio.Desktop.Tests.csproj

      - name: Build app (Release)
        run: dotnet build apps/desktop/CorpusStudio.Desktop/CorpusStudio.Desktop.csproj -c Release --no-restore

      - name: Test
        run: dotnet test apps/desktop/CorpusStudio.Desktop.Tests/CorpusStudio.Desktop.Tests.csproj -c Release --no-restore

      # Cross-platform Avalonia head (Phase 1 spike). Nothing else references it, so it needs its
      # own restore+build. Compiled bindings validate the shared-VM bindings at build time, so a
      # green build here IS the spike's guard. See docs/AVALONIA_MIGRATION_PLAN.md.
      - name: Build Avalonia head (Release)
        run: dotnet build apps/desktop/CorpusStudio.Avalonia/CorpusStudio.Avalonia.csproj -c Release

  # Prove the cross-platform Avalonia head (the mac/Linux distributable, issue #188) actually builds
  # on Linux every PR — so a platform-specific break is caught here, not first at release time.
  avalonia-linux-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Build Avalonia head on Linux (Release)
        run: dotnet build apps/desktop/CorpusStudio.Avalonia/CorpusStudio.Avalonia.csproj -c Release
