name: Engine Tests

on:
  push:
  pull_request:

jobs:
  python-engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install engine
        run: |
          cd engine
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          cd engine
          ruff check .

      - name: Type check (mypy)
        run: |
          cd engine
          mypy

      - name: Run tests with coverage
        run: |
          cd engine
          pytest --cov=corpus_studio --cov-report=term-missing
