name: Engine Tests

on:
  push:
  pull_request:

# Least privilege: this job only reads code and hands a separate CODECOV_TOKEN to codecov.
permissions:
  contents: read

jobs:
  python-engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Reject unresolved merge markers
        run: |
          if git grep -n -E '^(<<<<<<< |=======$|>>>>>>> )'; then
            echo "Unresolved merge markers found in tracked files."
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install engine
        # -c constraints.txt pins pydantic to the SAME version the schema-generation job (web.yml)
        # uses, so the engine is tested/type-checked against the exact pydantic that produced the
        # committed docs/contracts + apps/web/src/contracts. Single source: engine/constraints.txt.
        run: |
          cd engine
          python -m pip install --upgrade pip
          pip install -e ".[dev]" -c constraints.txt

      - name: Lint (ruff)
        run: |
          cd engine
          ruff check .

      - name: Type check (mypy)
        run: |
          cd engine
          mypy

      - name: Run tests with coverage
        run: |
          cd engine
          pytest --cov=corpus_studio --cov-report=term-missing --cov-report=xml

      # Upload coverage to Codecov. Soft-fail: this is best-effort reporting and must never
      # break the gate — it no-ops until a CODECOV_TOKEN secret is configured for the repo.
      - name: Upload coverage to Codecov
        # Pinned to an immutable commit SHA (not the mutable @v7 tag) because this third-party
        # action receives CODECOV_TOKEN: a moved/retagged upstream release must not run with the
        # secret. SHA is codecov/codecov-action tag v7 (fb8b3582 = v7 head at time of pinning);
        # bump deliberately with a re-review. See issue #426.
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./engine/coverage.xml
          flags: engine
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
