name: web

on:
  push:
    paths:
      - "apps/web/**"
      - "docs/contracts/**"
      - "engine/corpus_studio/platform/**"
      # The pinned pydantic drives JSON Schema serialization; a bump here can shift the committed
      # contracts, so re-run the regenerate+verify drift gate when the pin (or the extras) changes.
      - "engine/constraints.txt"
      - "engine/pyproject.toml"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "docs/contracts/**"
      - "engine/corpus_studio/platform/**"
      - "engine/constraints.txt"
      - "engine/pyproject.toml"
      - ".github/workflows/web.yml"

# Least privilege: typecheck + build only needs to read the repository.
permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install schema generator dependencies
        # JSON Schema details can change across pydantic releases. Install pydantic from the shared
        # engine/constraints.txt so this generator runtime and the engine test job (engine-tests.yml)
        # use the SAME pinned pydantic, keeping the committed schema/client diff gate reproducible.
        # Bump the version in that one file (regenerating the committed contracts in the same PR).
        run: python -m pip install -c "$GITHUB_WORKSPACE/engine/constraints.txt" pydantic
      - name: Install (locked)
        run: npm ci
      - name: Regenerate language-neutral schemas
        working-directory: engine
        run: >-
          python -c "from corpus_studio.platform.schema_export import export_json_schemas;
          export_json_schemas('../docs/contracts')"
      - name: Regenerate TypeScript contracts
        run: npm run gen:contracts
      - name: Verify committed contract clients are current
        run: |
          changes="$(git -C ../.. status --porcelain --untracked-files=all -- docs/contracts apps/web/src/contracts)"
          if [[ -n "$changes" ]]; then
            echo "$changes"
            git -C ../.. diff -- docs/contracts apps/web/src/contracts
            echo "Regenerate and commit the JSON Schema and TypeScript contract clients."
            exit 1
          fi
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
