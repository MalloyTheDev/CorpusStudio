version: 2
updates:
  # Python engine dependencies (pydantic / typer / orjson + dev tools).
  - package-ecosystem: "pip"
    directory: "/engine"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # The GitHub Actions used by the CI workflows themselves.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
