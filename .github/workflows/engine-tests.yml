name: Engine Tests

on:
  push:
  pull_request:

# Least privilege: this job only reads code and hands a separate CODECOV_TOKEN to codecov.
permissions:
  contents: read

jobs:
  python-engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Reject unresolved merge markers
        run: |
          if git grep -n -E '^(<<<<<<< |=======$|>>>>>>> )'; then
            echo "Unresolved merge markers found in tracked files."
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install engine
        run: |
          cd engine
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          cd engine
          ruff check .

      - name: Type check (mypy)
        run: |
          cd engine
          mypy

      - name: Run tests with coverage
        run: |
          cd engine
          pytest --cov=corpus_studio --cov-report=term-missing --cov-report=xml

      # Upload coverage to Codecov. Soft-fail: this is best-effort reporting and must never
      # break the gate — it no-ops until a CODECOV_TOKEN secret is configured for the repo.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./engine/coverage.xml
          flags: engine
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
